<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças - Login/Manutenção</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary-color: #007AFF; /* Apple Blue */
            --secondary-color: #5AC8FA; /* Lighter Blue */
            --text-color: #1C1C1E; /* Dark text */
            --light-text-color: #8E8E93; /* Gray text */
            --background-color: #F2F2F7; /* Light background */
            --card-background: #FFFFFF;
            --border-color: #E5E5EA;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--background-color);
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden; /* Prevent scroll on maintenance page */
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-background);
            border-radius: 15px;
            box-shadow: 0 8px 20px var(--shadow-color);
            padding: 30px;
            text-align: center;
        }

        .card h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--text-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            color: var(--text-color);
            background-color: var(--background-color);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            -webkit-appearance: none; /* Remove default iOS styling */
        }

        .input-group input::placeholder {
            color: var(--light-text-color);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2);
        }

        .btn {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3);
        }

        .btn-primary:hover {
            background-color: #0056b3; /* Darker blue */
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0, 122, 255, 0.4);
        }

        .btn-secondary {
            background-color: var(--border-color);
            color: var(--text-color);
            margin-top: 15px;
        }

        .btn-secondary:hover {
            background-color: #D1D1D6; /* Darker gray */
            transform: translateY(-1px);
        }

        .toggle-mode {
            margin-top: 20px;
            font-size: 15px;
            color: var(--light-text-color);
        }

        .toggle-mode a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }

        /* Maintenance Mode Specific Styles */
        #maintenance-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100vh;
            width: 100vw;
            background-color: var(--background-color);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        #maintenance-screen h1 {
            font-size: 42px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        #maintenance-screen p {
            font-size: 18px;
            color: var(--light-text-color);
            line-height: 1.6;
            max-width: 500px;
        }

        #maintenance-screen .icon {
            font-size: 80px;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Firebase Configuration (Replace with your actual config) -->
    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // --- GLOBAL MAINTENANCE MODE CONTROL ---
        const MAINTENANCE_REF = db.ref('maintenance_mode'); // Firebase path for maintenance status

        async function checkMaintenanceMode() {
            try {
                const snapshot = await MAINTENANCE_REF.once('value');
                const isInMaintenance = snapshot.val(); // true or false

                if (isInMaintenance) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('maintenance-screen').classList.remove('hidden');
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                    document.getElementById('maintenance-screen').classList.add('hidden');
                }
            } catch (error) {
                console.error("Erro ao verificar modo de manutenção:", error);
                // Fallback: show login screen if there's an error checking maintenance status
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('maintenance-screen').classList.add('hidden');
            }
        }

        // Call on page load
        document.addEventListener('DOMContentLoaded', checkMaintenanceMode);
        // Also listen for real-time changes to maintenance mode
        MAINTENANCE_REF.on('value', checkMaintenanceMode);

        // --- LOGIN/REGISTER LOGIC ---
        let isLoginMode = true; // State for login/register toggle

        function toggleFormMode() {
            isLoginMode = !isLoginMode;
            const loginTitle = document.getElementById('login-title');
            const submitBtn = document.getElementById('submit-btn');
            const toggleLink = document.getElementById('toggle-link');
            const toggleText = document.getElementById('toggle-text');

            if (isLoginMode) {
                loginTitle.textContent = 'Bem-vindo de volta!';
                submitBtn.textContent = 'Entrar';
                submitBtn.onclick = loginUser;
                toggleText.textContent = 'Não tem uma conta?';
                toggleLink.textContent = 'Cadastre-se';
            } else {
                loginTitle.textContent = 'Crie sua conta';
                submitBtn.textContent = 'Cadastrar';
                submitBtn.onclick = registerUser;
                toggleText.textContent = 'Já tem uma conta?';
                toggleLink.textContent = 'Faça login';
            }
        }

        async function loginUser() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert('Por favor, preencha todos os campos.');
                return;
            }

            try {
                await auth.signInWithEmailAndPassword(email, password);
                alert('Login bem-sucedido!');
                // Redirect to main app or dashboard
                window.location.href = '/dashboard.html'; // Placeholder for your main app
            } catch (error) {
                alert('Erro no login: ' + error.message);
            }
        }

        async function registerUser() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password || password.length < 6) {
                alert('Por favor, preencha todos os campos e use uma senha com no mínimo 6 caracteres.');
                return;
            }

            try {
                await auth.createUserWithEmailAndPassword(email, password);
                alert('Cadastro bem-sucedido! Você já está logado.');
                // Redirect to main app or dashboard
                window.location.href = '/dashboard.html'; // Placeholder for your main app
            } catch (error) {
                alert('Erro no cadastro: ' + error.message);
            }
        }

        // Initialize form mode on load
        document.addEventListener('DOMContentLoaded', toggleFormMode);
    </script>

    <!-- Login/Register Screen -->
    <div id="login-screen" class="container hidden">
        <div class="card">
            <h2 id="login-title">Bem-vindo de volta!</h2>
            <div class="input-group">
                <input type="email" id="email" placeholder="Seu e-mail" autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password">
            </div>
            <button id="submit-btn" class="btn btn-primary" onclick="loginUser()">Entrar</button>
            <div class="toggle-mode">
                <span id="toggle-text">Não tem uma conta?</span>
                <a href="#" id="toggle-link" onclick="toggleFormMode()">Cadastre-se</a>
            </div>
        </div>
    </div>

    <!-- Maintenance Screen -->
    <div id="maintenance-screen" class="hidden">
        <span class="icon">🛠️</span>
        <h1>Em Manutenção</h1>
        <p>Estamos trabalhando para melhorar sua experiência. O site estará de volta em breve!</p>
        <p>Agradecemos a sua paciência.</p>
    </div>

</body>
</html>
